name: GST Foresight - Daily Ingest

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-gte-small-v1
          restore-keys: hf-gte-small-

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Check required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          EMBED_SECRET: ${{ secrets.EMBED_SECRET }}
        run: |
          missing=0
          [ -z "$SUPABASE_URL" ]         && echo "MISSING: SUPABASE_URL"         && missing=1
          [ -z "$SUPABASE_SERVICE_KEY" ] && echo "MISSING: SUPABASE_SERVICE_KEY" && missing=1
          [ -z "$SARVAM_API_KEY" ]       && echo "MISSING: SARVAM_API_KEY"       && missing=1
          [ -z "$EMBED_SECRET" ]         && echo "MISSING: EMBED_SECRET"         && missing=1
          [ $missing -eq 1 ] && exit 1
          echo "All secrets present"

      - name: Run ingest pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          EMBED_SECRET: ${{ secrets.EMBED_SECRET }}
        run: HF_HUB_OFFLINE=0 python3 -m gst_foresight ingest --all

      - name: Generate predictions
        run: python3 -m gst_foresight predict

      - name: Refresh news ticker
        run: python3 scripts/scrape_ticker.py

      - name: Commit updated predictions + ticker
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions/latest.json data/news/ticker.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update predictions + ticker [skip ci] $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Show status
        run: python3 -m gst_foresight status
