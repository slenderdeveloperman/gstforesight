name: GST Foresight — News Ticker

on:
  schedule:
    - cron: '0 2 * * *'   # 07:30 IST daily (2:00 UTC)
  workflow_dispatch:

jobs:
  scrape-ticker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape GST news sources
        run: python3 scripts/scrape_ticker.py

      - name: Commit ticker.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news/ticker.json
          if git diff --cached --quiet; then
            echo "No new ticker items — nothing to commit"
          else
            git commit -m "chore: refresh news ticker [skip ci]"
            git push
          fi
